name: Reusable Frontend Lint

on:
  workflow_call:
    inputs:
      web_dir:
        required: false
        type: string
        default: web
      node_version:
        required: false
        type: string
        default: '20'

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout caller repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node_version }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint frontend
        run: pnpm -C ${{ inputs.web_dir }} lint --max-warnings=0
